<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
  <div class="survey-wrapper ff1-survey">

        <div id="section-counter" class="section-counter"></div>
        <h2 id="section-title"></h2>
        <p id="section-subtitle" class="section-subtitle"></p>

    </div>

    <div class="survey-nav">

        <button id="next-btn" class="btn btn-teal" style="flex:1" onclick="goNext()" disabled>Next Section →</button>
